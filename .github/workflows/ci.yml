name: CI

# Type-check (report-only for now), run the Vitest suite, and compile the app on
# every push/PR — the gate that replaces the manual bundle-grep + identifier-sweep
# we've been doing by hand. On a green push to master it then deploys the COMMITTED
# ref to Vercel (safer than the manual working-tree upload that caused the
# 2026-07-11 git-revert incident).
#
# ONE-TIME SETUP: add repo secret VERCEL_TOKEN (Settings > Secrets and variables >
# Actions). The org/project IDs below are not secret (they already live in
# scripts/deploy_vercel.ps1). Without the secret, `check` still runs; only deployment
# jobs fail harmlessly. To make production deploys manual instead of on-push, change the deploy
# job's `if:` to `github.event_name == 'workflow_dispatch'` and add workflow_dispatch
# to `on:`.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Secret scanning (audit S1) — BLOCKS preview and production deploys. Scans the
  # checkout (tracked files) with gitleaks; .env never reaches CI (gitignored) and
  # the two PEM-header string literals carry inline `gitleaks:allow` comments.
  # Pinned version; verified locally against this tree on 2026-07-18 (0 findings).
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks scan (blocking)
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks dir . --redact --no-banner --exit-code 1

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # Type-check is REPORT-ONLY until the pre-existing tsc backlog is burned down.
      # Flip to blocking (drop continue-on-error) once `npm run typecheck` is clean.
      - name: Type-check (report-only)
        run: npm run typecheck
        continue-on-error: true
      # Unit tests BLOCK the deploy. The suite was reconciled to the current
      # engines on 2026-07-16 (waterfall/irrWaterfall/acqPromote) and all 82
      # pass; a red suite should now fail the build rather than ship.
      - name: Unit tests
        run: npm run test:run
      - name: Build (vite, mirrors Vercel)
        run: npm run build:ci

  preview:
    needs: [check, secrets]
    # Same-repository pull requests receive an isolated Vercel preview URL.
    # This intentionally omits --prod, so master and the live application are
    # never changed by the preview job.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_8u90qS4wCl8RhHbboldHZyzT
      VERCEL_PROJECT_ID: prj_dGADWiLryETbJ5inT8pUZOHg7jYJ
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy pull request preview to Vercel
        run: |
          npm i -g vercel@latest
          preview_url=$(vercel deploy --yes --token="$VERCEL_TOKEN")
          echo "Preview: $preview_url"
          echo "## Vercel preview" >> "$GITHUB_STEP_SUMMARY"
          echo "[$preview_url]($preview_url)" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy:
    needs: [check, secrets]
    # Deploy the COMMITTED master ref on every green push to master (and on manual
    # dispatch). This makes committed master HEAD the single source of truth for
    # production and retires the working-tree upload (scripts/deploy_vercel.ps1),
    # which let a stale session clobber another session's committed work.
    # Requires repo secret VERCEL_TOKEN; without it this job fails harmlessly.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: team_8u90qS4wCl8RhHbboldHZyzT
      VERCEL_PROJECT_ID: prj_dGADWiLryETbJ5inT8pUZOHg7jYJ

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy committed ref to Vercel (production)
        run: |
          npm i -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
